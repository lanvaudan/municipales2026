<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bureau — Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #faf8e9;
            --text-color: #174916;
            --accent-color: #df9c0d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(23,73,22,0.08);
            width: 100%;
            max-width: 380px;
        }
        h1 {
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-color);
            letter-spacing: 2px;
            margin-bottom: 0.25rem;
        }
        .sub {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-bottom: 1.75rem;
        }
        .error-msg {
            background: #fdecea;
            border-left: 4px solid #d9534f;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border-radius: 4px;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid rgba(23,73,22,0.2);
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 4px;
            font-family: inherit;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover { background: #c4880b; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Bureau</h1>
        <p class="sub">Unis pour Lanvaudan — Administration</p>
        {{if .Error}}
        <div class="error-msg">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/bureau/login">
            <input type="password" name="password" placeholder="Mot de passe" autofocus required>
            <button type="submit">Se connecter</button>
        </form>
    </div>
</body>
</html>
